<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Low Poly Workers — Whitelist</title>
  <style>
    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── BASE ─── */
    body {
      min-height: 100vh;
      background: #0f0a06;
      font-family: 'Courier New', Courier, monospace;
      color: #e8d5b0;
      overflow-x: hidden;
    }

    /* ─── POLY BG ─── */
    .poly-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.15;
      pointer-events: none;
    }

    /* ─── LAYOUT ─── */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 460px;
      margin: 0 auto;
      padding: 40px 16px 60px;
    }

    /* ─── HEADER ─── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header-label {
      font-size: 10px;
      letter-spacing: 6px;
      color: #cd853f;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .header-title {
      font-size: 30px;
      font-weight: 900;
      color: #f5deb3;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 40px #b5651d55;
      margin-bottom: 8px;
    }
    .header-sub {
      font-size: 10px;
      color: #7a5a3a;
      letter-spacing: 3px;
    }

    /* ─── CARD ─── */
    .card {
      background: rgba(20, 12, 4, 0.90);
      border: 1px solid #5a3a1a;
      clip-path: polygon(14px 0%, 100% 0%, calc(100% - 14px) 100%, 0% 100%);
      padding: 30px 28px 26px;
      backdrop-filter: blur(12px);
      margin-bottom: 16px;
    }

    /* ─── CHECKBOX ROW ─── */
    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
      cursor: pointer;
      user-select: none;
    }
    .check-box {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 2px;
      background: transparent;
      border: 2px solid #5a3a1a;
      clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .check-box.active {
      background: #cd853f;
      border-color: #cd853f;
    }
    .check-tick {
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      display: none;
    }
    .check-box.active .check-tick { display: block; }
    .check-label { font-size: 12px; font-weight: 700; color: #f5deb3; letter-spacing: 1px; }
    .check-sub { font-size: 10px; color: #7a5a3a; margin-top: 3px; letter-spacing: 0.5px; }
    .accent { color: #cd853f; }

    /* ─── INPUT SECTION ─── */
    .field-label {
      font-size: 10px;
      color: #cd853f;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .field-wrap { margin-bottom: 18px; }

    input[type="text"] {
      width: 100%;
      background: rgba(180, 100, 30, 0.06);
      border: 1px solid #5a3a1a;
      border-bottom: 2px solid #cd853f;
      color: #f5deb3;
      padding: 11px 13px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      outline: none;
      letter-spacing: 0.5px;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #cd853f; border-bottom-color: #f5deb3; }
    input[type="text"]::placeholder { color: #5a3a1a; }

    /* ─── ERROR / SUCCESS ─── */
    .msg {
      padding: 9px 13px;
      font-size: 10px;
      letter-spacing: 1px;
      margin-bottom: 14px;
      clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
      display: none;
    }
    .msg.error { background: rgba(180,30,30,0.15); border: 1px solid #8b2020; color: #e07070; }
    .msg.success { background: rgba(30,100,30,0.15); border: 1px solid #2a6a2a; color: #70c070; }
    .msg.show { display: block; }

    /* ─── BUTTON ─── */
    .btn {
      width: 100%;
      padding: 14px 0;
      background: linear-gradient(135deg, #8b4513, #cd853f);
      border: none;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      transition: all 0.3s;
      font-family: 'Courier New', monospace;
    }
    .btn:hover { background: linear-gradient(135deg, #a0521a, #e09050); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.ok { background: linear-gradient(135deg, #2d6a2d, #4a9a4a); }

    /* ─── DIVIDER ─── */
    .divider {
      border: none;
      border-top: 1px solid #3a2010;
      margin: 20px 0;
    }

    /* ─── ENTRIES ─── */
    .entries-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .entries-title {
      font-size: 9px;
      letter-spacing: 4px;
      color: #5a3a1a;
      text-transform: uppercase;
    }
    .entries-count {
      font-size: 10px;
      color: #7a5a3a;
      letter-spacing: 2px;
    }
    .entry-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(20, 12, 4, 0.7);
      border: 1px solid #3a2010;
      padding: 8px 11px;
      clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
      margin-bottom: 5px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .entry-num { font-size: 9px; color: #5a3a1a; min-width: 24px; }
    .entry-addr { font-size: 11px; color: #e8d5b0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .entry-check { font-size: 9px; color: #4a8a4a; flex-shrink: 0; }

    /* ─── FOOTER NOTE ─── */
    .footer-note {
      text-align: center;
      font-size: 9px;
      color: #3a2010;
      letter-spacing: 2px;
      margin-top: 32px;
    }
  </style>
</head>
<body>

<!-- Poly SVG background -->
<svg class="poly-bg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <polygon points="0,0 200,80 100,200" fill="#b5651d"/>
  <polygon points="200,80 400,0 300,160" fill="#8b4513"/>
  <polygon points="400,0 600,100 500,200" fill="#cd853f"/>
  <polygon points="600,100 800,0 800,200" fill="#a0522d"/>
  <polygon points="0,200 100,200 0,400" fill="#6b3a2a"/>
  <polygon points="100,200 300,160 200,350" fill="#9c6b3a"/>
  <polygon points="300,160 500,200 400,380" fill="#7a4a1e"/>
  <polygon points="500,200 800,200 700,400" fill="#b87333"/>
  <polygon points="0,400 200,350 100,550" fill="#8b5e3c"/>
  <polygon points="200,350 400,380 300,600" fill="#6b4226"/>
  <polygon points="400,380 700,400 600,600" fill="#a0522d"/>
  <polygon points="700,400 800,200 800,600" fill="#7a3b1e"/>
  <polygon points="0,550 100,550 0,600" fill="#5a2d0c"/>
  <polygon points="100,550 300,600 200,600" fill="#7a4a1e"/>
  <polygon points="600,600 800,600 700,400" fill="#4a1a0a"/>
</svg>

<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-label">Low Poly Workers</div>
    <div class="header-title">Whitelist</div>
    <div class="header-sub">303 FREE MINT &nbsp;·&nbsp; 1/1 LOW POLY ART &nbsp;·&nbsp; ETH</div>
  </div>

  <!-- Form Card -->
  <div class="card">

    <!-- Follow -->
    <div class="check-row" onclick="toggle('followed')">
      <div class="check-box" id="box-followed"><span class="check-tick">✓</span></div>
      <div>
        <div class="check-label">FOLLOW <span class="accent">@lowpolygyy</span></div>
        <div class="check-sub">Required for WL eligibility</div>
      </div>
    </div>

    <!-- Like & RT -->
    <div class="check-row" onclick="toggle('likedRt')">
      <div class="check-box" id="box-likedRt"><span class="check-tick">✓</span></div>
      <div>
        <div class="check-label">LIKE &amp; RETWEET</div>
        <div class="check-sub">Pin post — comment 🏗️ to join group</div>
      </div>
    </div>

    <hr class="divider" />

    <!-- Address input -->
    <div class="field-wrap">
      <div class="field-label">◆ ETH Wallet Address</div>
      <input type="text" id="addr-input" placeholder="0x... or yourname.eth" autocomplete="off" autocapitalize="none" spellcheck="false" />
    </div>

    <!-- Messages -->
    <div class="msg error" id="msg-error"></div>
    <div class="msg success" id="msg-success"></div>

    <!-- Submit -->
    <button class="btn" id="submit-btn" onclick="handleSubmit()">◆ SUBMIT WALLET</button>

  </div>

  <!-- Session entries (this session only — all saved to Supabase) -->
  <div id="entries-section" style="display:none;">
    <div class="entries-header">
      <div class="entries-title">◆ This session</div>
      <div class="entries-count" id="session-count">0 submitted</div>
    </div>
    <div id="entries-list"></div>
  </div>

  <div class="footer-note">All submissions saved permanently · Powered by Supabase</div>

</div>

<script>
  // ─── CONFIG — swap these two lines ───────────────────────────────────────
  const SUPABASE_URL  = 'YOUR_SUPABASE_URL';        // e.g. https://xxxx.supabase.co
  const SUPABASE_KEY  = 'YOUR_SUPABASE_ANON_KEY';   // long anon/public key
  const TABLE         = 'lowpoly_wl';               // your Supabase table name
  // ─────────────────────────────────────────────────────────────────────────

  const state = { followed: false, likedRt: false, sessionEntries: [] };

  function toggle(key) {
    state[key] = !state[key];
    const box = document.getElementById('box-' + key);
    box.classList.toggle('active', state[key]);
  }

  function isValidEth(addr) {
    return /^0x[a-fA-F0-9]{40}$/.test(addr) || /^[a-zA-Z0-9-]+\.eth$/.test(addr);
  }

  function showMsg(type, text) {
    ['error','success'].forEach(t => {
      const el = document.getElementById('msg-' + t);
      el.classList.remove('show');
      el.textContent = '';
    });
    if (type && text) {
      const el = document.getElementById('msg-' + type);
      el.textContent = text;
      el.classList.add('show');
    }
  }

  function truncate(addr) {
    if (addr.endsWith('.eth')) return addr;
    return addr.slice(0, 8) + '...' + addr.slice(-6);
  }

  function addSessionEntry(addr) {
    state.sessionEntries.unshift(addr);
    const section = document.getElementById('entries-section');
    const list    = document.getElementById('entries-list');
    const count   = document.getElementById('session-count');
    section.style.display = 'block';
    count.textContent = state.sessionEntries.length + ' submitted';

    const row = document.createElement('div');
    row.className = 'entry-row';
    row.innerHTML = `
      <span class="entry-num">#${state.sessionEntries.length}</span>
      <span class="entry-addr">${truncate(addr)}</span>
      <span class="entry-check">✓ saved</span>
    `;
    list.prepend(row);
  }

  async function handleSubmit() {
    showMsg(null);
    const addr  = document.getElementById('addr-input').value.trim();
    const btn   = document.getElementById('submit-btn');

    if (!state.followed) return showMsg('error', 'Confirm you followed @lowpolygyy');
    if (!state.likedRt)  return showMsg('error', "Confirm you liked & RT'd the post");
    if (!addr)           return showMsg('error', 'Drop your wallet address');
    if (!isValidEth(addr)) return showMsg('error', 'ETH address (0x...) or ENS (.eth) only');

    btn.disabled = true;
    btn.textContent = 'SAVING...';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ address: addr })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        // Supabase unique violation = duplicate
        if (res.status === 409 || (err.code === '23505')) {
          showMsg('error', 'Address already registered');
        } else {
          showMsg('error', 'Save failed — try again');
        }
        btn.disabled = false;
        btn.textContent = '◆ SUBMIT WALLET';
        return;
      }

      addSessionEntry(addr);
      document.getElementById('addr-input').value = '';
      showMsg('success', '✓ Wallet saved — submit another if you have more');
      btn.classList.add('ok');
      btn.textContent = '✓ SAVED — ADD ANOTHER';
      setTimeout(() => {
        btn.classList.remove('ok');
        btn.textContent = '◆ SUBMIT WALLET';
        btn.disabled = false;
      }, 2000);

    } catch (e) {
      showMsg('error', 'Network error — check connection');
      btn.disabled = false;
      btn.textContent = '◆ SUBMIT WALLET';
    }
  }

  // Submit on Enter key
  document.getElementById('addr-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
